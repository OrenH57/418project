<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0;url=./" />
    <title>CampusConnect Redirect</title>
  </head>
  <body>
    <script>
      (function () {
        var appRoutes = {
          "": true,
          "app": true,
          "auth": true,
          "request": true,
          "driver-feed": true,
          "messages": true,
          "profile": true,
          "help": true,
          "rate": true,
          "admin": true
        };
        var path = location.pathname || "/";
        var firstSegment = path.split("/").filter(Boolean)[0] || "";
        var basePath = firstSegment && !appRoutes[firstSegment] ? "/" + firstSegment : "";
        var appPath = path.slice(basePath.length) || "/";

        sessionStorage.setItem(
          "campusconnect-gh-redirect",
          JSON.stringify({
            path: basePath + appPath,
            search: location.search,
            hash: location.hash
          })
        );
        location.replace((basePath || "") + "/");
      })();
    </script>
  </body>
</html>
