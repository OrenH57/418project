<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CampusConnect</title>
    <script>
      (function () {
        const redirect = sessionStorage.getItem("campusconnect-gh-redirect");
        if (!redirect) return;
        sessionStorage.removeItem("campusconnect-gh-redirect");
        const { path, search, hash } = JSON.parse(redirect);
        history.replaceState(null, "", path + search + hash);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
